<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nakliye Şirketi</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:#f8fafc;color:#222}
    header{background:#0f172a;color:white;padding:15px 40px;display:flex;justify-content:space-between;align-items:center}
    .logo{display:flex;align-items:center;gap:12px}
    .logo img{height:50px}
    .logo h1{font-size:22px}
    .search{padding:8px 14px;border:none;border-radius:8px}
    .hero{padding:80px 40px;text-align:center;background:#e2e8f0}
    .hero img{height:90px;margin-bottom:20px}
    .hero h2{font-size:38px;margin-bottom:10px}
    .hero p{color:#555;margin-bottom:25px}
    .btn{background:#0f172a;color:white;padding:12px 24px;border:none;border-radius:8px;cursor:pointer}
    .services{display:flex;justify-content:center;gap:20px;padding:60px 40px}
    .card{background:white;padding:25px;border-radius:14px;box-shadow:0 4px 12px rgba(0,0,0,.08);width:250px;text-align:center}
    footer{text-align:center;padding:20px;background:#0f172a;color:white}
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="resim.png" alt="Logo">
      <h1>Hızlı Nakliyat</h1>
    </div>
    <input class="search" type="text" placeholder="Ara...">
  </header>

  <section class="hero">
    <img src="resim2.png" alt="Üst Logo">
    <h2>Güvenilir Nakliye Hizmeti</h2>
    <p>Eşyalarınızı hızlı, güvenli ve ekonomik şekilde taşıyoruz.</p>
    <button class="btn">Teklif Al</button>
  </section>

  <section class="services">
    <div class="card"><h3>Ev Taşıma</h3><p>Profesyonel ekip ile güvenli taşıma.</p></div>
    <div class="card"><h3>Ofis Taşıma</h3><p>Hızlı ve düzenli kurumsal taşıma.</p></div>
    <div class="card"><h3>Şehirlerarası</h3><p>Tüm Türkiye’ye güvenli teslimat.</p></div>
  </section>

  <footer>
    © 2026 Hızlı Nakliyat
  </footer>
</body>
</html>
